<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
      #lagrieta-planner-app {
        font-family: 'Inter', sans-serif;
        -webkit-font-smoothing: antialiased;
        color: #000000;
        line-height: 1.5;
      }
      #lagrieta-planner-app .font-mono {
        font-family: 'JetBrains Mono', monospace;
      }
      /* Custom scrollbar para el resumen */
      #lagrieta-planner-app .custom-scrollbar::-webkit-scrollbar {
        width: 4px;
      }
      #lagrieta-planner-app .custom-scrollbar::-webkit-scrollbar-track {
        background: #f1f1f1;
      }
      #lagrieta-planner-app .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #000;
      }
    </style>
</head>
<body>
    <div id="lagrieta-planner-app"></div>
    <script type="module" src="/index.tsx"></script>
</body>
</html>
